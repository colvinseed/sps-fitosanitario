name: Tablero de condiciones SPS (horario)

# Actualiza SOLO las condiciones actuales de la página de inicio, cada hora.
# Es una tarea liviana: una única petición al JSON del mapa de Agromet, que
# trae de una vez las condiciones de todas las estaciones.
#
# El pronóstico de enfermedades NO se recalcula aquí: eso corre una vez al día
# en daily.yml (06:00 Chile), porque requiere 47 estaciones x 44 días de datos
# horarios.
#
# Minuto 17 (no en punto) para evitar la congestión de las horas redondas, que
# es cuando GitHub encola los trabajos programados de todo el mundo.

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

# Evita que dos corridas se pisen si una se atrasa
concurrency:
  group: tablero
  cancel-in-progress: false

jobs:
  tablero:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests

      - name: Extraer condiciones actuales (mapa Agromet)
        run: python src/agromet_tablero.py --out condiciones.json

      - name: Publicar condiciones.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add condiciones.json
          # Si no hubo cambios, no se genera commit (evita ruido en el historial)
          git diff --staged --quiet || git commit -m "Condiciones actuales $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
